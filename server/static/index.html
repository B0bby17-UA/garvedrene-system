<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garvedrene System</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/auth.js"></script>
  <style>
    .auth-page {
      display: flex; min-height: 100vh; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 100%);
    }
    .auth-box {
      background: var(--bg-secondary); border: 1px solid var(--gold);
      border-radius: 20px; padding: 40px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .auth-box h1 { text-align: center; font-size: 28px; color: var(--gold); margin-bottom: 4px; }
    .auth-box .subtitle { text-align: center; color: var(--text-dim); margin-bottom: 28px; font-size: 14px; }
    .auth-box .toggle { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-dim); }
    .auth-box .toggle a { color: var(--gold); cursor: pointer; }
    .auth-box .toggle a:hover { color: var(--gold-light); }
    .auth-box .error { color: var(--red); font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
    .auth-box .form-group { margin-bottom: 16px; }
    .auth-box .form-group label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 4px; display: block; }
    .auth-box .form-group input { width: 100%; padding: 10px 14px; font-size: 15px; }
    .auth-box .btn-submit { width: 100%; padding: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <h1>⚔️ GARVEDRENE SYSTEM</h1>
    <p class="subtitle">Sua mesa de RPG na nuvem</p>
    <div class="error" id="authError"></div>

    <form id="loginForm" onsubmit="return false;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button class="btn btn-gold btn-submit" onclick="handleLogin()">Entrar</button>
      <div class="toggle">Não tem conta? <a onclick="showRegister()">Cadastre-se</a></div>
    </form>

    <form id="registerForm" style="display:none;" onsubmit="return false;">
      <div class="form-group">
        <label>Nome de usuário</label>
        <input type="text" id="regUsername" placeholder="Seu nome" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <button class="btn btn-gold btn-submit" onclick="handleRegister()">Criar Conta</button>
      <div class="toggle">Já tem conta? <a onclick="showLogin()">Fazer login</a></div>
    </form>
  </div>
</div>

<script>
function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}

function showLogin() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('registerForm').style.display = 'none';
  showError('');
}

function showRegister() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registerForm').style.display = 'block';
  showError('');
}

async function handleLogin() {
  showError('');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('Preencha todos os campos'); return; }
  try {
    const data = await api('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });
    if (data.token) {
      setToken(data.token); setUser(data.user);
      redirectAfterLogin();
    } else {
      showError(data.detail || 'Erro ao fazer login');
    }
  } catch (e) { showError('Erro de conexão: ' + e.message); }
}

async function handleRegister() {
  showError('');
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!username || !email || !password) { showError('Preencha todos os campos'); return; }
  if (password.length < 6) { showError('Senha deve ter no mínimo 6 caracteres'); return; }
  try {
    const data = await api('/auth/register', {
      method: 'POST',
      body: JSON.stringify({ email, username, password })
    });
    if (data.token) {
      setToken(data.token); setUser(data.user);
      redirectAfterLogin();
    } else {
      showError(data.detail || 'Erro ao cadastrar');
    }
  } catch (e) { showError('Erro de conexão: ' + e.message); }
}

// Redirect after login
function redirectAfterLogin() {
  const saved = localStorage.getItem('redirect_after_login');
  if (saved) { localStorage.removeItem('redirect_after_login'); window.location.href = saved; }
  else { window.location.href = '/dashboard'; }
}

// If already logged in, redirect
if (isLoggedIn()) { redirectAfterLogin(); }
</script>
</body>
</html>
