services:
  - type: web
    name: garvedrene-system
    runtime: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: cd server && python server.py
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: garvedrene-db
          property: connectionString
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000

databases:
  - name: garvedrene-db
    region: frankfurt
    plan: free
    databaseName: garvedrene
    ipAllowList: []